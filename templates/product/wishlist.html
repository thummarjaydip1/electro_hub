{% extends "base.html" %} {% load static %} {% block content %}

<div class="container py-5">
  <!-- Heading -->
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h2 class="fw-bold text-dark" style="margin-left: 175px">My Wishlist</h2>
  </div>

  <div class="row g-4">
    {% for i in product %}

    <div class="col-lg-6 col-md-6 mb-4">
      <div
        class="card border-0 shadow-lg rounded-4 h-100 overflow-hidden"
        style="margin-left: 175px"
      >
        <!-- Product Image -->
        <div class="bg-light text-center p-3">
          <img
            src="{{ i.image.url }}"
            class="img-fluid"
            alt="{{ i.name }}"
            style="height: 250px; object-fit: contain"
          />
        </div>

        <!-- Card Body -->
        <div class="card-body d-flex flex-column p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="badge bg-info"> {{ i.category }} </span>

            <img
              src="{% static 'assets/img/off/off.jpg' %}"
              alt="logo"
              width="60"
              class="rounded-circle shadow-sm"
            />
          </div>
          <!-- Product Name -->
          <h4 class="fw-bold text-dark">{{ i.name }}</h4>

          <!-- Price -->
          <h5 class="text-success fw-bold mt-2">₹{{ i.price }}</h5>

          <!-- Description -->
          <p class="text-secondary mt-3 flex-grow-1">{{ i.description}}</p>

          <!-- Buttons -->
          <div class="d-flex gap-2 mt-3">
            <a href="{% url 'order_now' i.id %}" class="btn btn-primary w-100">
              Order Now
            </a>

            <a href="{% url 'product_display_id' i.id %}" class="btn btn-dark">
              Details
            </a>

            <a href="{% url 'remove_wishlist' i.id %}" class="btn btn-danger" onclick="return confirm('Are you sure?')">
              Remove
            </a>
          </div>
        </div>
      </div>
    </div>

    {% empty %}

    <div class="col-12" style="margin-left:120px"> 
      <div class="card border-0 shadow rounded-4 p-5 text-center">
        <img
          src="{% static 'assets/img/empty/empty.jpg' %}"
          width="300"
          class="mx-auto mb-4"
        />

        <h3 class="fw-bold text-dark">No Wishlist Product</h3>

        <p class="text-secondary">Your wishlist is empty.</p>

        <center>
          <a href="{% url "product_display" %}" class="btn btn-warning" style="width:200px">Add Wishlist</a>
        </center>
      </div>
    </div>

    {% endfor %}
  </div>
</div>

{% endblock %}
