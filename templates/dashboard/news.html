<html>
  <head>
    <title>News Page</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f4f7fc;
      }

      .news-title {
        font-size: 40px;
        font-weight: bold;
        color: #0d6efd;
      }

      .search-box {
        max-width: 500px;
        margin: auto;
      }

      .card {
        border: none;
        border-radius: 15px;
        overflow: hidden;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card img {
        height: 220px;
        object-fit: cover;
      }

      .card-body {
        display: flex;
        flex-direction: column;
      }

      .card-body p {
        flex-grow: 1;
        color: #555;
      }

      .btn-news {
        border-radius: 10px;
      }
    </style>
  </head>

  <body>
    <!-- HEADING -->
    <div class="container mt-4 text-center">
      <h1 class="news-title">News Portal</h1>

      <p class="text-muted">Latest India News.....</p>
    </div>

    <!-- SEARCH -->
    <div class="container mt-4">
      <form method="GET" class="search-box d-flex gap-2">
        <input
          type="text"
          name="q"
          class="form-control form-control-lg"
          placeholder="Search News..."
        />

        <button class="btn btn-primary btn-lg">Search</button>
      </form>
    </div>

    <!-- NEWS -->
    <div class="container mt-5">
      <div class="row">
        {% for i in articles %}

        <div class="col-md-4 mb-4">
          <div class="card h-100">
            <img
              src="{{ i.urlToImage }}"
              class="card-img-top"
              onerror="this.style.display = 'none'"
            />

            <div class="card-body">
              <h5 class="fw-bold">{{ i.title }}</h5>

              {% if i.description %}
              <p>{{ i.description|truncatewords:20 }}</p>
              {% else %}
              <p></p>
              {% endif %}
              <p
                style="
                  margin-top: auto;
                  margin-bottom: 10px;
                  font-size: 14px;
                  color: #6c757d;
                  font-weight: 500;
                  background: #eef3ff;
                  padding: 6px 10px;
                  border-radius: 8px;
                  display: inline-block;
                "
              >
                {{ i.publishedAt }}
              </p>

              <a
                href="{{ i.url }}"
                target="_blank"
                class="btn btn-primary btn-news"
              >
                Read More
              </a>
            </div>
          </div>
        </div>

        {% endfor %}
      </div>
    </div>
  </body>
</html>
