{% extends "base.html" %}
{% block content %}
<html
  lang="en"
  class="layout-menu-fixed layout-compact"
  data-assets-path="../assets/"
  data-template="vertical-menu-template-free">
  <head>
    <style>
    body{
        background-color: #f4f5fb;
        font-family: Arial, Helvetica, sans-serif;
    }

    .profile-container{
        margin-left: 250px;
        margin-top: -450px;
    }

    .profile-card{
        width: 420px;
        background: #fff;
        border-radius: 12px;
        padding: 25px;
        box-shadow: 0px 4px 12px rgba(0,0,0,0.7);
    }

    .profile-heading{
        font-size: 28px;
        font-weight: bold;
        color: #333;
        margin-bottom: 20px;
        border-bottom: 2px solid #eee;
        padding-bottom: 10px;
    }

    .profile-table{
        width: 100%;
        border-collapse: collapse;
    }

    .profile-table tr{
        border-bottom: 1px solid #eee;
    }

    .profile-table td{
        padding: 14px 8px;
        font-size: 15px;
    }

    .label{
        font-weight: bold;
        color: #555;
        width: 230px;
    }

    .value{
        color: #222;
    }

    .profile-table tr:last-child{
        border-bottom: none;
    }

    .icon{
        width: 35px;
        height:35px;
    }
    .category_btn{
      width:100%;
      background-color:red;
      padding:7px;
      border-radius:10px;
      border:none;
      color:white;
    }
    .category_textbox{
      width:100%;
      padding:8px;
      border-radius:7px;
    }
</style>
  </head>

  <body>
    <!-- Layout wrapper -->
    <div class="layout-wrapper layout-content-navbar">
      <div class="layout-container">
        <div class="layout-page">
          
          <div class="profile-container">

            <div class="profile-card">

                <div class="profile-heading">Feedback Form</div>

                <form method="POST">
                {% csrf_token %}

                <table class="profile-table">

                    <tr>
                        <td class="label">Enter Name</td>
                    </tr>
                    <tr>
                        <td class="label">
                          <input type="text" name="name" value="{{data.name}}" class="category_textbox" placeholder="Enter Name">
                        </td>
                    </tr>

                    <tr>
                        <td class="label">Enter Email</td>
                    </tr>
                    <tr>
                        <td class="label">
                          <input type="email" value="{{data.email}}" name="email" class="category_textbox" placeholder="Enter Email">
                        </td>
                    </tr>

                    <tr>
                        <td class="label">Select Rating</td>
                    </tr>
                    <tr>
                        <td class="label">
                            <select name="rating" class="category_textbox">
                                <option value="Excellent">Excellent</option>
                                <option value="Good">Good</option>
                                <option value="Poor">Poor</option>
                            </select>
                        </td>
                    </tr>

                    <tr>
                        <td class="label">Enter Message</td>
                    </tr>
                    <tr>
                        <td class="label">
                            <textarea name="message" class="category_textbox" placeholder="Enter Message">{{data.message}}</textarea>
                        </td>
                    </tr>

                    <tr>
                        <td class="label">
                          <button type="submit" class="category_btn">Send Feedback</button>
                        </td>
                    </tr>

                </table>
                </form>

            </div>

        </div>

        </div>
      </div>
    </div>
    <!-- / Layout wrapper -->

    <div class="buy-now">
      <a
        href="https://themeselection.com/item/materio-dashboard-pro-bootstrap/"
        target="_blank"
        class="btn btn-danger btn-buy-now"
        >Upgrade to Pro</a
      >
    </div>

  </body>
</html>
{% endblock  %}
